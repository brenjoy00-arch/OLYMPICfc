<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIC FC | Squad Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans text-slate-900">

<div id="app-container" class="min-h-screen pb-32 overflow-x-hidden">
  
  <section id="screen-auth" class="min-h-screen flex items-center justify-center p-4 bg-red-600">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl space-y-4 border-4 border-white overflow-y-auto max-h-[95vh]">
      <div class="text-center">
        <div class="w-16 h-16 bg-red-600 rounded-full mx-auto mb-3 flex items-center justify-center border-4 border-red-50">
            <i class="fas fa-shield-halved text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-black text-red-600 italic uppercase tracking-tighter">OLYMPIC FC</h1>
        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Official Player Registry</p>
      </div>

      <div class="space-y-3 pt-4 border-t border-gray-100">
        <div class="flex space-x-2">
          <input type="text" id="reg-first" placeholder="First Name" class="w-1/2 p-3 bg-gray-50 rounded-xl text-sm border border-gray-100 outline-none">
          <input type="text" id="reg-last" placeholder="Last Name" class="w-1/2 p-3 bg-gray-50 rounded-xl text-sm border border-gray-100 outline-none">
        </div>
        
        <select id="reg-team" class="w-full p-3 bg-gray-50 rounded-xl text-sm border border-gray-100 outline-none font-bold text-red-600">
            <option value="">Select Your Squad</option>
            <option value="U14">Under 14s</option>
            <option value="U16">Under 16s</option>
            <option value="First Team">First Team</option>
        </select>

        <div class="flex space-x-2">
            <input type="number" id="reg-age" placeholder="Age" class="w-1/3 p-3 bg-gray-50 rounded-xl text-sm border border-gray-100">
            <input type="text" id="reg-pos" placeholder="Position" class="w-2/3 p-3 bg-gray-50 rounded-xl text-sm border border-gray-100">
        </div>

        <input type="password" id="reg-pass" placeholder="Squad Password" class="w-full p-3 bg-gray-50 rounded-xl text-sm border border-gray-100 outline-none">
        
        <div class="grid grid-cols-2 gap-2 pt-2">
            <button onclick="handleLogin('coach')" class="bg-red-600 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all">Coach Login</button>
            <button onclick="handleLogin('player')" class="bg-slate-800 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all">Player Login</button>
        </div>
      </div>
    </div>
  </section>

  <div id="screen-main" class="hidden">
    <header class="bg-white p-5 shadow-md sticky top-0 z-50 flex justify-between items-center rounded-b-[2rem] border-b-4 border-red-600">
      <div class="flex items-center space-x-3">
        <div id="header-img" class="w-10 h-10 rounded-full bg-red-600 border-2 border-red-100 flex items-center justify-center text-white font-black text-xs overflow-hidden"></div>
        <div>
            <h2 id="user-welcome" class="text-sm font-black text-slate-800 italic uppercase leading-none">WELCOME</h2>
            <p id="team-display" class="text-[9px] text-red-600 font-bold uppercase italic">Olympic FC</p>
        </div>
      </div>
      <span id="role-badge" class="text-[8px] font-black px-2 py-1 rounded-md uppercase tracking-tighter">Role</span>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-6">
      
      <div id="tab-home" class="tab-content space-y-6">
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border-l-8 border-red-600">
            <p class="text-[10px] font-black text-red-600 uppercase italic mb-2 tracking-widest">Next Training Session</p>
            <h3 class="text-xl font-black text-slate-800 italic" id="train-day">Loading Schedule...</h3>
            <p class="text-xs text-gray-400 font-bold uppercase" id="train-loc">Ground Details</p>
        </div>

        <div class="bg-white rounded-[2rem] p-6 shadow-sm border-t-4 border-red-600">
            <div class="flex justify-between items-center mb-4">
                <p class="text-[10px] font-black text-red-600 uppercase italic">Next Match</p>
            </div>
            <div class="flex items-center justify-between mb-4">
                <div class="text-center w-1/3">
                    <div class="w-12 h-12 bg-red-50 rounded-full mx-auto mb-2 flex items-center justify-center font-black text-red-600 border border-red-100">OFC</div>
                    <p class="text-[10px] font-black uppercase">Olympic FC</p>
                </div>
                <div class="text-center text-xl font-black italic text-red-600">VS</div>
                <div class="text-center w-1/3">
                    <div class="w-12 h-12 bg-gray-50 rounded-full mx-auto mb-2 flex items-center justify-center font-black text-gray-400 border border-gray-100">OPP</div>
                    <p class="text-[10px] font-black uppercase tracking-tighter" id="opp-name">Opponent</p>
                </div>
            </div>
            <div id="goal-section" class="border-t border-gray-50 pt-4">
                <p class="text-[9px] font-black text-gray-400 uppercase mb-2">Live Scorer Log</p>
                <div id="goal-list" class="space-y-1 mb-3"></div>
                <div class="coach-only flex space-x-2">
                    <input type="text" id="goal-input" placeholder="Scorer Name" class="flex-grow p-2 bg-gray-50 rounded-lg text-[10px] border outline-none">
                    <button onclick="addGoal()" class="bg-red-600 text-white px-3 py-2 rounded-lg text-[10px] font-black uppercase">Log Goal</button>
                </div>
            </div>
        </div>
      </div>

      <div id="tab-messages" class="tab-content hidden space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border-2 border-red-600">
          <p class="text-[10px] font-black text-red-600 uppercase italic mb-2">🚗 Ride Logistics</p>
          <div class="grid grid-cols-2 gap-2">
            <button onclick="postRide('Needs a Lift')" class="p-2 border-2 border-gray-100 text-[10px] font-black rounded-xl uppercase hover:bg-red-50">Need Lift</button>
            <button onclick="postRide('Has Space in Car')" class="p-2 border-2 border-gray-100 text-[10px] font-black rounded-xl uppercase hover:bg-red-50">Can Drive</button>
          </div>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
           <textarea id="chat-input" placeholder="Share with the team..." class="w-full p-3 bg-gray-50 rounded-xl text-xs outline-none h-20 resize-none"></textarea>
           <div class="flex space-x-2">
             <button onclick="postMessage()" class="flex-grow bg-red-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-md">Post Message</button>
             <button onclick="togglePollModal()" class="coach-only bg-slate-800 text-white px-4 rounded-xl font-black text-[10px] uppercase">New Poll</button>
           </div>
        </div>
        <div id="chat-feed" class="space-y-4 pb-10"></div>
      </div>

      <div id="tab-tactics" class="tab-content hidden space-y-4">
        <div class="flex justify-between items-center px-1">
          <div class="flex space-x-2">
            <button id="btn-red-marker" onclick="setMarkerColor('red')" class="w-10 h-10 rounded-full bg-red-600 border-4 border-white shadow scale-110"></button>
            <button id="btn-blue-marker" onclick="setMarkerColor('blue')" class="w-10 h-10 rounded-full bg-blue-600 border-2 border-white shadow"></button>
          </div>
          <button onclick="clearMarkers()" class="coach-only text-[10px] font-black text-red-600 bg-red-50 px-4 py-2 rounded-full uppercase">Reset Board</button>
        </div>
        <div id="tactical-pitch" class="relative w-full aspect-[3/4] bg-emerald-700 rounded-[2.5rem] border-4 border-white shadow-2xl overflow-hidden cursor-crosshair">
            <div class="absolute inset-0 pointer-events-none opacity-30">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-20 border-b-2 border-x-2 border-white"></div>
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-48 h-20 border-t-2 border-x-2 border-white"></div>
                <div class="absolute top-1/2 w-full h-px bg-white"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 border-2 border-white rounded-full"></div>
            </div>
        </div>
        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100">
            <textarea id="tactic-notes" placeholder="Session focus..." class="w-full p-3 bg-slate-50 rounded-xl text-xs outline-none h-28 border border-gray-100 resize-none"></textarea>
        </div>
      </div>

      <div id="tab-drills" class="tab-content hidden space-y-4">
        <div class="coach-only bg-white p-5 rounded-3xl border-2 border-red-100">
          <input type="text" id="drill-title" placeholder="Drill Name" class="w-full p-3 bg-gray-50 rounded-xl text-sm border border-gray-100 mb-2 outline-none">
          <textarea id="drill-notes" placeholder="Execution details..." class="w-full p-3 bg-gray-50 rounded-xl text-sm border border-gray-100 h-20 mb-2 outline-none"></textarea>
          <button onclick="addDrill()" class="w-full bg-red-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">Upload To Vault</button>
        </div>
        <div id="drill-feed" class="space-y-4"></div>
      </div>

      <div id="tab-lineup" class="tab-content hidden space-y-4">
        <div class="relative w-full aspect-[3/4] bg-emerald-800 rounded-[2.5rem] border-4 border-white/20 shadow-2xl p-6 flex flex-col justify-between">
          <div class="flex justify-around mt-4"><div class="player-slot" onclick="setSlot(this)">ST</div><div class="player-slot" onclick="setSlot(this)">ST</div></div>
          <div class="flex justify-between px-2"><div class="player-slot" onclick="setSlot(this)">LM</div><div class="player-slot" onclick="setSlot(this)">CM</div><div class="player-slot" onclick="setSlot(this)">CM</div><div class="player-slot" onclick="setSlot(this)">RM</div></div>
          <div class="flex justify-between px-2"><div class="player-slot" onclick="setSlot(this)">LB</div><div class="player-slot" onclick="setSlot(this)">CB</div><div class="player-slot" onclick="setSlot(this)">CB</div><div class="player-slot" onclick="setSlot(this)">RB</div></div>
          <div class="player-slot bg-yellow-500 border-yellow-200 mx-auto" onclick="setSlot(this)">GK</div>
        </div>
      </div>

      <div id="tab-profile" class="tab-content hidden space-y-6">
        <div class="bg-white p-8 rounded-[3rem] shadow-sm text-center relative border-b-8 border-red-600">
          <div class="relative w-24 h-24 mx-auto mb-4">
            <div id="prof-img-box" class="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center text-white text-3xl font-black shadow-lg overflow-hidden">
                <span id="prof-initials">?</span>
            </div>
            <label class="absolute bottom-0 right-0 bg-slate-800 text-white w-8 h-8 rounded-full border-2 border-white flex items-center justify-center cursor-pointer">
                <i class="fas fa-camera text-[10px]"></i>
                <input type="file" class="hidden" onchange="uploadPhoto(this)">
            </label>
          </div>
          <div id="profile-view" class="space-y-1">
            <h2 id="prof-name" class="text-xl font-black text-slate-800 italic uppercase">Name</h2>
            <p id="prof-team-display" class="text-[10px] text-red-600 font-bold uppercase"></p>
            <p id="prof-details" class="text-[10px] text-gray-400 font-black uppercase mt-2"></p>
            <button onclick="toggleProfileEdit()" class="text-[10px] font-black text-red-600 uppercase mt-4 underline">
